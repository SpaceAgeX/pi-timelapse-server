<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Printer Camera</title>
    <link rel="stylesheet" href="/static/style.css?v=8">
</head>
<body>
    <main class="camera-workspace">
        <section class="camera-stage" aria-label="Live printer camera">
            <header class="top-bar">
                <div class="brand">
                    <span class="brand-mark" aria-hidden="true"></span>
                    <div>
                        <p class="eyebrow">Printer camera</p>
                        <h1>Neptune 4</h1>
                    </div>
                </div>
                <div class="header-actions">
                    <div id="camera-status" class="status status-loading">
                        Connecting
                    </div>
                    <button id="camera-power-button" class="danger-button"
                        type="button">Cam off</button>
                    <button id="logout-button" class="secondary-button"
                        type="button">Sign out</button>
                </div>
            </header>

            <div class="video-frame">
                <img id="camera-feed" src="/api/stream"
                    alt="Live view of the 3D printer">
                <div id="camera-error" class="camera-error hidden">
                    Camera preview unavailable
                </div>
                <div class="live-badge"><span></span>Live</div>
            </div>

            <section class="statistics-grid" aria-label="Timelapse statistics">
                <article class="stat-card">
                    <span class="stat-label">Elapsed</span>
                    <strong id="elapsed-value">00:00:00</strong>
                </article>
                <article class="stat-card">
                    <span class="stat-label">Remaining</span>
                    <strong id="remaining-value">—</strong>
                </article>
                <article class="stat-card">
                    <span class="stat-label">Photos</span>
                    <strong id="frame-count">0</strong>
                </article>
                <article class="stat-card">
                    <span class="stat-label">Session</span>
                    <strong id="session-size">0 MB</strong>
                </article>
                <article class="stat-card">
                    <span class="stat-label">Free</span>
                    <strong id="free-storage">—</strong>
                </article>
            </section>
        </section>

        <aside class="control-dock">
            <section class="control-card">
                <div class="section-heading">
                    <div>
                        <p class="eyebrow">Recording controls</p>
                        <h2>Timelapse</h2>
                    </div>
                    <div id="timelapse-state" class="state-badge">Idle</div>
                </div>

                <div class="form-group">
                    <label for="print-name">Print name</label>
                    <input id="print-name" type="text" maxlength="80"
                        value="Overnight Print" placeholder="Overnight Print">
                </div>
                <div class="form-group">
                    <label for="interval">Photo interval</label>
                    <div class="input-with-unit">
                        <input id="interval" type="number" value="10"
                            min="1" max="3600" step="0.1" required>
                        <span>seconds</span>
                    </div>
                </div>

                <label class="checkbox-row">
                    <input id="delete-frames" type="checkbox" checked>
                    <span>Delete photos after the MP4 is created</span>
                </label>
                <div class="button-row">
                    <button id="start-button" class="primary-button"
                        type="button">Start timelapse</button>
                    <button id="stop-button" class="danger-button"
                        type="button" disabled>Stop &amp; create video</button>
                </div>
                <p id="message" class="message" aria-live="polite"></p>
            </section>

            <section class="recordings-card">
                <div class="section-heading">
                    <div>
                        <p class="eyebrow">Saved files</p>
                        <h2>Videos</h2>
                    </div>
                    <div class="recording-actions">
                        <button id="refresh-recordings" class="secondary-button"
                            type="button">Refresh</button>
                        <button id="clear-recordings" class="danger-button"
                            type="button">Clear all</button>
                    </div>
                </div>
                <div id="recordings-list">
                    <p class="empty-message">Loading recordings…</p>
                </div>
            </section>
        </aside>
    </main>
    <script src="/static/script.js?v=2"></script>
</body>
</html>
